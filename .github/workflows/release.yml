name: 🚀 Auto Release
on:
  push:
    tags:
      - 'v*' # Trigger when tags like v1.0.0, v2.1.3 are pushed

permissions:
  contents: write # Needed to create releases

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for changelog generation

      - name: Install Zip
        run: sudo apt-get install -y zip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true
          
      - name: Build Nexus Binary
        run: |
          echo "Building Nexus for Linux amd64..."
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o nexus ./cmd/nexus/...
          tar -czvf nexus-linux-amd64.tar.gz nexus

      - name: Package Source Code
        run: |
          echo "Packaging source code..."
          # Exclude .git and temporary files
          zip -r cachyos-workstation.zip . -x "*.git*" -x "*.tmp" -x "*.bak" -x "tmp/*"

      - name: Extract Release Notes from CHANGELOG
        id: extract_notes
        run: |
          # Get the tag being pushed (e.g. v1.1.0)
          VERSION="${GITHUB_REF_NAME}"
          echo "Extracting release notes for $VERSION from CHANGELOG.md..."

          # Use AWK to extract text between current and next release heading
          # Pattern: match "## [v1.1.0]" then print until next "## [" heading
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (printing) exit
              if (index($0, ver)) { printing=1; next }
            }
            printing
          ' CHANGELOG.md > release_body.txt

          if [ ! -s release_body.txt ]; then
            echo "No matching CHANGELOG entry found for $VERSION, using auto-generated notes."
            echo "Release $VERSION" > release_body.txt
          fi

          echo "Release notes extracted successfully."

      - name: Generate Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cachyos-workstation.zip
            nexus-linux-amd64.tar.gz
          fail_on_unmatched_files: true
          body_path: release_body.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
