name: 🚀 Auto Release
on:
  push:
    tags:
      - 'v*' # Trigger when tags like v1.0.0, v2.1.3 are pushed

permissions:
  contents: write # Needed to create releases

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for changelog generation

      - name: Install Zip
        run: sudo apt-get install -y zip

      - name: Package Source Code
        run: |
          echo "Packaging source code..."
          # Exclude .git and temporary files
          zip -r cachyos-workstation.zip . -x "*.git*" -x "*.tmp" -x "*.bak" -x "tmp/*"

      - name: Extract Release Notes from CHANGELOG
        id: extract_notes
        run: |
          # Dapatkan tag yang sedang di-push (misal: v1.1.0)
          VERSION="${GITHUB_REF_NAME}"
          echo "Extracting release notes for $VERSION from CHANGELOG.md..."
          
          # Gunakan AWK untuk mengekstrak teks di antara judul rilis saat ini dan rilis berikutnya
          awk -v ver="\\[$VERSION\\]" '/^## \[/ { if (p) { exit }; if ($2 == ver) { p=1; next } } p' CHANGELOG.md > release_body.txt
          
          echo "Catatan Rilis berhasil diekstrak."

      - name: Generate Release
        uses: softprops/action-gh-release@v2
        with:
          files: cachyos-workstation.zip
          fail_on_unmatched_files: true
          body_path: release_body.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
