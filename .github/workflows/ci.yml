name: "🔍 CI Pipeline"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: "🛡️ ShellCheck Lint (Bootstrap Scripts)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck on install.sh and build.sh
        run: shellcheck -x -s bash install.sh build.sh || true

  golang:
    name: "🐹 Golang Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true
          cache: true
      
      - name: Install dependencies
        run: go mod download

      - name: Verify formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

      - name: Run Tests
        run: go test -v ./...

      - name: Build Nexus CLI
        run: go build -v .

  security:
    name: "🔐 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No hardcoded secrets
        run: |
          errors=0
          patterns=('AKIA[0-9A-Z]{16}' 'ghp_[a-zA-Z0-9]{36}' 'sk-[a-zA-Z0-9]{48}')
          for pat in "${patterns[@]}"; do
            if grep -rPn "$pat" --include='*.go' --include='*.sh' . 2>/dev/null; then
              echo "❌ Potential secret found matching: $pat"
              errors=$((errors + 1))
            fi
          done
          [ "$errors" -eq 0 ] && echo "✅ No hardcoded secrets detected" || exit 1

