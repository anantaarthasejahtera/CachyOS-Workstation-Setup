version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "anantaarthasejahtera"
    assignees:
      - "anantaarthasejahtera"

  # Maintain npm dependencies for VitePress docs
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "documentation"
    reviewers:
      - "anantaarthasejahtera"
    assignees:
      - "anantaarthasejahtera"
